[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# Serverless functions (Groq proxy lives in netlify/functions/groq.mjs)
[functions]
  directory = "netlify/functions"

# SPA redirect — all routes served by index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
